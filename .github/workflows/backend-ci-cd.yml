name: Backend CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: backend-ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/e2-e3-tictactoe-api
  AZURE_IMAGE_NAME: ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io/e2-e3-backend
  DB_USERNAME: ${{ secrets.CI_DB_USERNAME }}
  DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
  DB_NAME: ${{ secrets.CI_DB_NAME }}
  DB_HOST: ${{ secrets.CI_DB_HOST }}
  DB_PORT: ${{ secrets.CI_DB_PORT }}
  JWT_TOKEN_LOCATION: ${{ secrets.CI_JWT_TOKEN_LOCATION }}
  JWT_HEADER_NAME: ${{ secrets.CI_JWT_HEADER_NAME }}
  JWT_HEADER_TYPE: ${{ secrets.CI_JWT_HEADER_TYPE }}
  JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY }}
  FERN_KEY: ${{ secrets.CI_FERN_KEY }}
  HOST: ${{ secrets.CI_APP_HOST }}
  PORT: ${{ secrets.CI_APP_PORT }}
  ADMIN_USERNAME: ${{ secrets.CI_ADMIN_USERNAME }}
  ADMIN_EMAIL: ${{ secrets.CI_ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
  MPLCONFIGDIR: /tmp/matplotlib

jobs:
  ci:
    name: Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_DB=${{ secrets.CI_DB_NAME }} \
            -e POSTGRES_USER=${{ secrets.CI_DB_USERNAME }} \
            -e POSTGRES_PASSWORD=${{ secrets.CI_DB_PASSWORD }} \
            -p 5432:5432 \
            postgres:18

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 30); do
            docker exec postgres pg_isready \
              -U ${{ secrets.CI_DB_USERNAME }} \
              -d ${{ secrets.CI_DB_NAME }} && break
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  publish-image:
    name: Publish Docker Image
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Validate Azure registry secret format
        run: |
          if [ -z "${{ secrets.AZURE_CONTAINER_REGISTRY }}" ]; then
            echo "AZURE_CONTAINER_REGISTRY is empty"
            exit 1
          fi
          if [[ "${{ secrets.AZURE_CONTAINER_REGISTRY }}" == *".azurecr.io"* ]]; then
            echo "AZURE_CONTAINER_REGISTRY must be only the registry name (example: tttcontainerregistry)"
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI login to ACR
        run: az acr login --name ${{ secrets.AZURE_CONTAINER_REGISTRY }}

      - name: Extract Docker metadata for GitHub
        id: meta-github
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      - name: Extract Docker metadata for Azure
        id: meta-azure
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta-github.outputs.tags }}
            ${{ steps.meta-azure.outputs.tags }}
          labels: ${{ steps.meta-github.outputs.labels }}

  deploy-to-azure:
    name: Deploy to Azure Container Instances
    needs: publish-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create or update Azure Container Instance
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name e2-e3-backend \
            --image ${{ env.AZURE_IMAGE_NAME }}:latest \
            --registry-login-server ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io \
            --registry-username ${{ secrets.AZURE_REGISTRY_USERNAME }} \
            --registry-password ${{ secrets.AZURE_REGISTRY_PASSWORD }} \
            --ports 5000 \
            --environment-variables \
              DB_HOST="${{ secrets.CI_DB_HOST }}" \
              DB_PORT="${{ secrets.CI_DB_PORT }}" \
              DB_NAME="${{ secrets.CI_DB_NAME }}" \
              DB_USER="${{ secrets.CI_DB_USERNAME }}" \
              FLASK_ENV="production" \
              JWT_TOKEN_LOCATION="${{ secrets.CI_JWT_TOKEN_LOCATION }}" \
              JWT_HEADER_NAME="${{ secrets.CI_JWT_HEADER_NAME }}" \
              JWT_HEADER_TYPE="${{ secrets.CI_JWT_HEADER_TYPE }}" \
              FERN_KEY="${{ secrets.CI_FERN_KEY }}" \
              HOST="${{ secrets.CI_APP_HOST }}" \
              PORT="${{ secrets.CI_APP_PORT }}" \
              ADMIN_USERNAME="${{ secrets.CI_ADMIN_USERNAME }}" \
              ADMIN_EMAIL="${{ secrets.CI_ADMIN_EMAIL }}" \
              MPLCONFIGDIR="/tmp/matplotlib" \
            --secure-environment-variables \
              DB_PASSWORD="${{ secrets.CI_DB_PASSWORD }}" \
              JWT_SECRET_KEY="${{ secrets.CI_JWT_SECRET_KEY }}" \
              ADMIN_PASSWORD="${{ secrets.CI_ADMIN_PASSWORD }}" \
            --cpu 1 \
            --memory 1.5 \
            --restart-policy Always \
            --ip-address Public \
            --dns-name-label e2-e3-backend \
            --overwrite || \
          az container update \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name e2-e3-backend \
            --image ${{ env.AZURE_IMAGE_NAME }}:latest \
            --environment-variables \
              DB_HOST="${{ secrets.CI_DB_HOST }}" \
              DB_PORT="${{ secrets.CI_DB_PORT }}" \
              DB_NAME="${{ secrets.CI_DB_NAME }}" \
              DB_USER="${{ secrets.CI_DB_USERNAME }}" \
              FLASK_ENV="production" \
              JWT_TOKEN_LOCATION="${{ secrets.CI_JWT_TOKEN_LOCATION }}" \
              JWT_HEADER_NAME="${{ secrets.CI_JWT_HEADER_NAME }}" \
              JWT_HEADER_TYPE="${{ secrets.CI_JWT_HEADER_TYPE }}" \
              FERN_KEY="${{ secrets.CI_FERN_KEY }}" \
              HOST="${{ secrets.CI_APP_HOST }}" \
              PORT="${{ secrets.CI_APP_PORT }}" \
              ADMIN_USERNAME="${{ secrets.CI_ADMIN_USERNAME }}" \
              ADMIN_EMAIL="${{ secrets.CI_ADMIN_EMAIL }}" \
              MPLCONFIGDIR="/tmp/matplotlib" \
            --secure-environment-variables \
              DB_PASSWORD="${{ secrets.CI_DB_PASSWORD }}" \
              JWT_SECRET_KEY="${{ secrets.CI_JWT_SECRET_KEY }}" \
              ADMIN_PASSWORD="${{ secrets.CI_ADMIN_PASSWORD }}"

      - name: Get container FQDN
        run: |
          az container show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name e2-e3-backend \
            --query ipAddress.fqdn