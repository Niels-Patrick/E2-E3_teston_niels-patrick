name: Backend CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/e2-e3-tictactoe-api
  DB_USERNAME: ${{ secrets.CI_DB_USERNAME || 'postgres' }}
  DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'postgres' }}
  DB_NAME: ${{ secrets.CI_DB_NAME || 'tictactoe_test' }}
  DB_HOST: ${{ secrets.CI_DB_HOST || '127.0.0.1' }}
  DB_PORT: ${{ secrets.CI_DB_PORT || '5432' }}
  JWT_TOKEN_LOCATION: ${{ secrets.CI_JWT_TOKEN_LOCATION || 'headers' }}
  JWT_HEADER_NAME: ${{ secrets.CI_JWT_HEADER_NAME || 'Authorization' }}
  JWT_HEADER_TYPE: ${{ secrets.CI_JWT_HEADER_TYPE || 'Bearer' }}
  JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY || 'test-secret-key' }}
  FERN_KEY: ${{ secrets.CI_FERN_KEY || '6nNQ8nL4g5pUQNoT5M1dM2J4RERhTzNnZ2hGc0o1aVk=' }}
  HOST: ${{ secrets.CI_APP_HOST || '127.0.0.1' }}
  PORT: ${{ secrets.CI_APP_PORT || '5000' }}
  ADMIN_USERNAME: ${{ secrets.CI_ADMIN_USERNAME || 'admin' }}
  ADMIN_EMAIL: ${{ secrets.CI_ADMIN_EMAIL || 'admin@example.com' }}
  ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'admin1234' }}
  MPLCONFIGDIR: /tmp/matplotlib

jobs:
  ci:
    name: Pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ${{ secrets.CI_DB_NAME || 'tictactoe_test' }}
          POSTGRES_USER: ${{ secrets.CI_DB_USERNAME || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'postgres' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ secrets.CI_DB_USERNAME || 'postgres' }} -d ${{ secrets.CI_DB_NAME || 'tictactoe_test' }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  publish-image:
    name: Publish Docker Image
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}